; ============================================================
; FreePBX + Asterisk 16.30 + chan_dongle + CentOS
; Файл: /etc/asterisk/extensions_custom.conf
; ============================================================
; ВНИМАНИЕ: Не редактируйте extensions.conf вручную!
; FreePBX перезаписывает его при каждом изменении через GUI.
; Весь кастомный диаплан — ТОЛЬКО в extensions_custom.conf.
; ============================================================

; --- Контекст для входящих SMS от chan_dongle ---
;chan_dongle.conf:
;  [dongle0]
;    context=sms-incoming
;    sms_extension=sms
;    ...

[sms-incoming]

; ===== ВАРИАНТ 1: AGI() — БЛОКИРУЮЩИЙ (РЕКОМЕНДУЕТСЯ) =====
; AGI парсит аргументы через stdin, поэтому кавычки и
; спецсимволы в тексте SMS НЕ ЛОМАЮТ вызов.
; Asterisk ждёт завершения скрипта.
exten => sms,1,NoOp(--- SMS от ${DONGLECID} ---)
 same => n,Set(SMS_DATE=${STRFTIME(${EPOCH},,%Y-%m-%d %H:%M:%S)})
 same => n,AGI(/var/lib/asterisk/sms_gateway/asterisk_sms_to_matrix.agi,${DONGLECID},${SMS_DATE},${DONGLETEXT})
 same => n,Hangup()

; ===== ВАРИАНТ 2: System() — НЕБЛОКИРУЮЩИЙ =====
; ВНИМАНИЕ: Если SMS содержит двойные кавычки ("), бэктики (`)
; или знаки доллара ($), этот вариант сломает аргументы!
; Используйте только если уверены, что SMS не содержит
; спецсимволов. Иначе — вариант 3.
;exten => sms,1,NoOp(--- SMS от ${DONGLECID} ---)
; same => n,Set(SMS_DATE=${STRFTIME(${EPOCH},,%Y-%m-%d %H:%M:%S)})
; same => n,System(/var/lib/asterisk/sms_gateway/asterisk_sms_to_matrix.sh "${DONGLECID}" "${SMS_DATE}" "${DONGLETEXT}")
; same => n,Hangup()

; ===== ВАРИАНТ 3: System() + TEMP FILE (БЕЗОПАСНО) =====
; Текст SMS передаётся через временный файл, спецсимволы
; не влияют на разбор аргументов.
; ВНИМАНИЕ: single quote (') в тексте тоже сломает вызов.
; Полностью безопасен только AGI.
;exten => sms,1,NoOp(--- SMS от ${DONGLECID} ---)
; same => n,Set(SMS_DATE=${STRFTIME(${EPOCH},,%Y-%m-%d %H:%M:%S)})
; same => n,Set(TMPFILE=/tmp/sms_${UNIQUEID}.txt)
; same => n,System(printf '%%s' '${DONGLETEXT}' > '${TMPFILE}')
; same => n,System(/var/lib/asterisk/sms_gateway/asterisk_sms_to_matrix.sh "${DONGLECID}" "${SMS_DATE}" "${TMPFILE}")
; same => n,System(rm -f '${TMPFILE}')
; same => n,Hangup()

; ============================================================
; Подключение контекста:
;
; Вариант A: Через FreePBX GUI (рекомендуется)
;   Connectivity → Inbound Routes → Add
;   Set Destination: Custom Context → sms-incoming
;
; Вариант B: Через extensions_custom.conf
;   Добавьте в конец файла:
;     [from-external]
;     include => sms-incoming
; ============================================================
